<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Reminder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #6750A4;
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .btn:hover { background: #7c6bb0; }
        .links { margin-top: 24px; }
        .links a {
            color: #6750A4;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎂</div>
        <h1>Birthday Reminder</h1>
        <p class="subtitle">Never forget a birthday again. Track birthdays, get reminders, and share with friends.</p>
        <a class="btn" href="https://play.google.com/store/apps/details?id=net.tomascichero.birthdayremainder">Get on Google Play</a>
        <div class="links">
            <a href="mailto:martoxdlol@gmail.com">Contact</a>
        </div>
    </div>
</body>
</html>
